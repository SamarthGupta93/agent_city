services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override localhost URIs to use the postgres service name inside Docker
      VECTOR_DB_URI: postgresql+psycopg://postgres:admin@postgres:5432/rag
      POSTGRES_SESSION_URI: postgresql://postgres:admin@postgres:5432/rag
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: rag
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
